<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeFlow</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      color: #f1f5f9;
    }

    /* Beautiful horizontal scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      height: 10px;
      width: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5);
      border-radius: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.3);
      border-radius: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.6);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .glass-effect {
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(16px);
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: inherit;
      z-index: -1;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' },
            accent: { 400: '#c084fc', 500: '#a855f7' }
          }
        }
      }
    }
  </script>
</head>

<body class="antialiased min-h-screen text-slate-100 selection:bg-brand-500 selection:text-white overflow-hidden">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- Utility Functions ---
    const parseDate = (dateStr) => new Date(dateStr + "T00:00:00");
    const formatDate = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    const MS_PER_DAY = 24 * 60 * 60 * 1000;
    const PIXELS_PER_DAY = 24; // Base zoom level

    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.warn(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.warn(error);
        }
      };
      return [storedValue, setValue];
    }

    // --- Date Editor Component ---
    const DateEditor = ({ value, onChange, className }) => {
      const [isEditing, setIsEditing] = useState(false);

      if (isEditing) {
        return (
          <input
            type="date"
            value={value}
            onChange={(e) => {
              if (e.target.value) {
                onChange(e.target.value);
              }
              setIsEditing(false);
            }}
            onBlur={() => setIsEditing(false)}
            autoFocus
            className="bg-slate-800 text-xs px-1 py-0.5 rounded outline-none text-brand-400 border border-brand-500/50"
          />
        );
      }

      return (
        <span
          onClick={() => setIsEditing(true)}
          className={`cursor-pointer hover:bg-slate-700/80 rounded px-1 -mx-1 transition-colors ${className}`}
          title="修改日期"
        >
          {value}
        </span>
      );
    }

    // --- Components ---
    const EditableText = ({ value, onChange, className, as: Component = "span" }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [text, setText] = useState(value);
      const inputRef = useRef(null);

      useEffect(() => { setText(value); }, [value]);
      useEffect(() => { if (isEditing && inputRef.current) inputRef.current.focus(); }, [isEditing]);

      const handleBlur = () => {
        setIsEditing(false);
        if (text.trim() !== value) onChange(text || "空文本");
      };

      if (isEditing) {
        return (
          <input
            ref={inputRef}
            value={text}
            onChange={(e) => setText(e.target.value)}
            onBlur={handleBlur}
            onKeyDown={(e) => e.key === 'Enter' && handleBlur()}
            className={`bg-slate-800 border-b border-brand-500 outline-none text-slate-100 px-1 py-0 ${className}`}
            style={{ width: `${Math.max(text.length * 1.5, 4)}ch` }}
          />
        );
      }
      return (
        <Component onClick={() => setIsEditing(true)} className={`cursor-pointer hover:bg-slate-700/80 rounded px-1 -mx-1 transition-colors ${className}`} title="点击修改">${text}</Component>
      );
    };

    const PRESET_BG_COLORS = [
      { id: 'slate', val: 'bg-slate-900', label: '深空蓝' },
      { id: 'gray', val: 'bg-gray-900', label: '极简黑' },
      { id: 'zinc', val: 'bg-zinc-900', label: '炫酷灰' },
      { id: 'grad1', val: 'bg-gradient-to-br from-slate-900 to-emerald-900', label: '翡翠星云' },
      { id: 'grad2', val: 'bg-gradient-to-tr from-slate-900 via-purple-900 to-slate-900', label: '紫晶幻境' },
    ];

    const App = () => {
      const [title, setTitle] = useLocalStorage("gantt-title", "TimeFlow");
      const [tasks, setTasks] = useLocalStorage("gantt-tasks", []);
      const [showDetails, setShowDetails] = useLocalStorage("gantt-details", false);
      const [bgConfig, setBgConfig] = useLocalStorage("gantt-bg", { type: 'color', val: 'bg-slate-900' });

      const [showBgMenu, setShowBgMenu] = useState(false);
      const [customImgUrl, setCustomImgUrl] = useState("");

      const today = useMemo(() => new Date(), []);

      // Calculate global date boundaries
      const dateStats = useMemo(() => {
        let minTime = Infinity;
        let maxTime = -Infinity;

        tasks.forEach(t => {
          const start = parseDate(t.startDate).getTime();
          const end = parseDate(t.endDate).getTime();
          if (start < minTime) minTime = start;
          if (end > maxTime) maxTime = end;
        });

        // Default boundaries if empty or barely populated
        const defaultMin = new Date(today.getTime() - 15 * MS_PER_DAY).getTime();
        const defaultMax = new Date(today.getTime() + 180 * MS_PER_DAY).getTime(); // 6 months future margin

        if (minTime > defaultMin) minTime = defaultMin;
        if (maxTime < defaultMax) maxTime = defaultMax;

        const paddedMin = new Date(minTime - 10 * MS_PER_DAY);
        const paddedMax = new Date(maxTime + 30 * MS_PER_DAY);

        const totalDurationDays = Math.ceil((paddedMax.getTime() - paddedMin.getTime()) / MS_PER_DAY);

        return {
          minDate: paddedMin,
          maxDate: paddedMax,
          totalDurationDays,
          timelineWidth: totalDurationDays * PIXELS_PER_DAY
        };
      }, [tasks, today]);

      // Calculate Months for X-Axis based on exact days
      const months = useMemo(() => {
        const result = [];
        let cur = new Date(dateStats.minDate);
        cur.setDate(1); // start of month

        while (cur <= dateStats.maxDate) {
          const monthStart = new Date(Math.max(cur, dateStats.minDate));
          const monthEnd = new Date(cur.getFullYear(), cur.getMonth() + 1, 0, 23, 59, 59, 999);
          const effectiveEnd = new Date(Math.min(monthEnd, dateStats.maxDate));

          const daysInSpan = (effectiveEnd.getTime() - monthStart.getTime()) / MS_PER_DAY;

          if (daysInSpan > 0) {
            result.push({
              name: cur.toLocaleString('zh-CN', { month: 'long', year: 'numeric' }),
              widthPx: daysInSpan * PIXELS_PER_DAY
            });
          }
          cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
        }
        return result;
      }, [dateStats]);

      // Today Offset
      const todayOffsetPx = useMemo(() => {
        const time = today.getTime();
        if (time < dateStats.minDate.getTime() || time > dateStats.maxDate.getTime()) return null;
        return ((time - dateStats.minDate.getTime()) / MS_PER_DAY) * PIXELS_PER_DAY;
      }, [dateStats, today]);

      const handleUpdateTask = (id, updates) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, ...updates } : t));
      };

      const handleAddTask = () => {
        const d1 = new Date();
        const d2 = new Date(d1.getTime() + 14 * MS_PER_DAY);

        const icons = ['✨', '🚀', '🎯', '💡', '📅'];
        const colors = ['bg-blue-500', 'bg-purple-500', 'bg-emerald-500', 'bg-orange-500', 'bg-pink-500'];

        setTasks([...tasks, {
          id: Date.now(),
          title: "新建计划任务",
          icon: icons[tasks.length % icons.length],
          color: colors[tasks.length % colors.length],
          startDate: formatDate(d1),
          endDate: formatDate(d2),
          milestones: []
        }]);
      };

      const handleDeleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));

      const handleAddMilestone = (taskId) => {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        const newMs = [...(task.milestones || []), { date: task.endDate, label: "新节点" }];
        handleUpdateTask(taskId, { milestones: newMs });
      };

      const handleUpdateMilestone = (taskId, idx, updates) => {
        setTasks(tasks.map(t => {
          if (t.id !== taskId) return t;
          const newMs = [...t.milestones];
          newMs[idx] = { ...newMs[idx], ...updates };
          return { ...t, milestones: newMs };
        }));
      };

      const handleRemoveMilestone = (taskId, idx) => {
        setTasks(tasks.map(t => {
          if (t.id !== taskId) return t;
          const newMs = t.milestones.filter((_, i) => i !== idx);
          return { ...t, milestones: newMs };
        }));
      };

      const clearAll = () => {
        if (confirm("确定要清空所有数据吗？")) setTasks([]);
      };

      const bgStyles = bgConfig.type === 'image'
        ? { backgroundImage: `url(${bgConfig.val})`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundAttachment: 'fixed' }
        : {};
      const bgClasses = bgConfig.type === 'color' ? bgConfig.val : 'bg-slate-900';

      return (
        <div className={`w-full h-full relative transition-colors duration-500 ${bgClasses}`} style={bgStyles}>
          {/* Subtle overlay for image backgrounds to ensure readable text */}
          {bgConfig.type === 'image' && <div className="absolute inset-0 bg-slate-950/60 transition-all pointer-events-none"></div>}

          <div className="flex flex-col h-full overflow-hidden p-6 lg:p-8 gap-6 relative z-10 w-full max-w-full">

            {/* Header */}
            <header className="flex justify-between items-end pb-4 border-b border-white/10 shrink-0">
              <div>
                <EditableText
                  as="h1"
                  value={title}
                  onChange={setTitle}
                  className="text-4xl lg:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-400 to-white py-1 block w-max"
                />
                <p className="text-slate-300/70 mt-2 text-sm ml-1 flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
                  数据已安全保存在本地缓存
                </p>
              </div>
              <div className="flex gap-4 lg:gap-8 flex-wrap justify-end">
                <button onClick={handleAddTask} className="flex items-center gap-2 bg-brand-500 hover:bg-brand-400 text-white px-4 py-2 rounded-lg font-medium shadow-lg hover:shadow-brand-500/30 transition-all">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                  添加事件
                </button>
                <div className="flex gap-8 text-right bg-black/30 p-2 lg:p-4 rounded-xl border border-white/10 backdrop-blur-md">
                  <div>
                    <div className="text-slate-400/80 text-[10px] lg:text-xs uppercase tracking-widest mb-1 font-semibold">进行中任务</div>
                    <div className="text-brand-300 font-semibold text-base lg:text-lg flex items-center gap-2 justify-end">
                      <span className="w-2h-2 rounded-full bg-brand-400 animate-pulse shadow-[0_0_8px_rgba(56,189,248,0.8)]"></span>
                      {tasks.filter(t => parseDate(t.startDate) <= today && parseDate(t.endDate) >= today).length}
                    </div>
                  </div>
                  <div className="w-px bg-white/20 mx-1"></div>
                  <div>
                    <div className="text-slate-400/80 text-[10px] lg:text-xs uppercase tracking-widest mb-1 font-semibold">今日日期</div>
                    <div className="text-slate-100 font-medium text-base lg:text-lg">
                      {formatDate(today)}
                    </div>
                  </div>
                </div>
              </div>
            </header>

            {/* Main Workspace (Scrollable inner) */}
            <main className="flex-1 rounded-2xl border border-white/10 shadow-2xl overflow-hidden flex flex-col relative glass-effect">
              {/* Outer Horizontal Scroller */}
              <div className="flex-1 overflow-x-auto custom-scrollbar flex">

                {/* Fixed Y-Axis Column */}
                <div className="w-64 lg:w-72 shrink-0 border-r border-white/10 bg-slate-900/60 sticky left-0 z-40 backdrop-blur-xl flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.5)]">
                  {/* Space for Header offset */}
                  <div className="h-14 lg:h-16 border-b border-white/10 p-4 font-semibold text-slate-300 flex items-center bg-transparent shrink-0">
                    <span className="bg-white/10 p-1.5 rounded-md mr-3 text-xs text-brand-400 border border-white/5">📌</span>
                    项目名称
                  </div>

                  {/* Tasks labels body scroll vertically */}
                  {/* Note: In a real advanced Gantt, Y-axis scrolling must sync with X-axis body scrolling. 
                      Since we have a wrapper that does both we'll use a CSS trick to sync them or just render them as a flex table row.
                      Wait, the easiest way to ensure rows align is rendering each row fully (Label + Bar Area) and letting it all scroll! */}
                </div>

                {/* Because we want the whole body to scroll horizontally but header to stick to top, and left col stick to left: 
                    We can recreate the grid. Let's rewrite the DOM structure slightly to use standard sticky layout. */}
              </div>
            </main>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
